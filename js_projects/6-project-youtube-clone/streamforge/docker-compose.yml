version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: streamforge_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypass123
      POSTGRES_DB: myapp
    ports:
      - '5432:5432'
    volumes:
      - streamforge_pgdata:/var/lib/postgresql/data

volumes:
  streamforge_pgdata:
