<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Todo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">✅ Smart Todo</div>
      <button id="theme-toggle" class="icon-btn" title="Toggle theme">
        🌓
      </button>
    </header>

    <section id="todo-input">
      <input id="todo-text" placeholder="What needs to be done?" />
      <input id="todo-category" placeholder="Category..." list="cat-list" />
      <datalist id="cat-list"></datalist>
      <input title="todo-date" id="todo-date" type="date" />
      <button type="button" id="add-btn">＋ Add</button>
    </section>

    <section id="toolbar">
      <input id="search" placeholder="🔍 Search todos..." />
      <div id="filter-buttons"></div>
    </section>

    <div id="progress-wrap">
      <div id="progress-label">0 of 0 done</div>
      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>
    </div>

    <main id="todo-list"></main>

    <div id="empty-state" class="hidden">
      <p>🎉 Nothing here. Add a todo above!</p>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
