<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PyCalc Pro - Advanced GUI Calculator</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Roboto Mono", monospace;
        background: linear-gradient(135deg, #0f0f23, #1a1a2e);
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .calculator {
        background: #16213e;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        width: 380px;
        border: 2px solid #00ffcc;
      }

      .display {
        background: #0a0a1f;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        text-align: right;
        min-height: 120px;
        border: 1px solid #00ffcc;
        position: relative;
      }

      #expression {
        font-size: 18px;
        color: #00ffcc;
        min-height: 30px;
        word-break: break-all;
      }

      #result {
        font-size: 42px;
        font-weight: bold;
        color: white;
        margin-top: 8px;
      }

      .history {
        max-height: 100px;
        overflow-y: auto;
        font-size: 12px;
        color: #aaa;
        margin-top: 10px;
        text-align: left;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }

      button {
        font-family: "Roboto Mono", monospace;
        font-size: 18px;
        padding: 18px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
        font-weight: 700;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 15px rgba(0, 255, 204, 0.3);
      }

      .digit {
        background: #1e2a4d;
        color: white;
      }

      .digit:active {
        background: #2e3f6e;
      }

      .operator {
        background: #00b894;
        color: white;
      }

      .operator:active {
        background: #00a080;
      }

      .special {
        background: #e17055;
        color: white;
      }

      .special:active {
        background: #d15a40;
      }

      .equals {
        background: #00ffcc;
        color: #0f0f23;
        font-weight: bold;
        grid-column: span 2;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #334466;
      }

      .title {
        font-size: 22px;
        font-weight: bold;
        color: #00ffcc;
      }

      .mode-toggle {
        display: flex;
        background: #1e2a4d;
        border-radius: 30px;
        padding: 4px;
      }

      .mode-btn {
        padding: 6px 16px;
        border-radius: 30px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.3s;
      }

      .mode-btn.active {
        background: #00ffcc;
        color: #0f0f23;
      }
    </style>
  </head>
  <body>
    <div class="calculator">
      <div class="header">
        <div class="title">PyCalc Pro</div>
        <div class="mode-toggle">
          <div onclick="setMode(0)" id="mode-basic" class="mode-btn active">
            Basic
          </div>
          <div onclick="setMode(1)" id="mode-scientific" class="mode-btn">
            Scientific
          </div>
        </div>
      </div>

      <div class="display">
        <div id="expression"></div>
        <div id="result">0</div>
        <div class="history" id="history"></div>
      </div>

      <div class="buttons" id="button-grid">
        <!-- Buttons will be generated by JavaScript -->
      </div>
    </div>

    <script>
      let currentInput = "";
      let previousInput = "";
      let operator = "";
      let shouldReset = false;
      let history = [];
      let isScientific = false;

      const displayResult = document.getElementById("result");
      const displayExpression = document.getElementById("expression");
      const historyDiv = document.getElementById("history");
      const buttonGrid = document.getElementById("button-grid");

      function updateDisplay() {
        displayResult.textContent = currentInput || "0";
        displayExpression.textContent =
          previousInput + (operator ? " " + operator : "");
      }

      function addToHistory(expr, result) {
        history.unshift(`${expr} = ${result}`);
        if (history.length > 5) history.pop();
        historyDiv.innerHTML = history.map((h) => `<div>${h}</div>`).join("");
      }

      function calculate() {
        if (!operator || !currentInput) return;

        let num1 = parseFloat(previousInput);
        let num2 = parseFloat(currentInput);
        let result;

        switch (operator) {
          case "+":
            result = num1 + num2;
            break;
          case "-":
            result = num1 - num2;
            break;
          case "*":
            result = num1 * num2;
            break;
          case "/":
            if (num2 === 0) {
              alert("Cannot divide by zero!");
              clearAll();
              return;
            }
            result = num1 / num2;
            break;
          case "%":
            result = num1 % num2;
            break;
          case "^":
            result = Math.pow(num1, num2);
            break;
        }

        const expr = `${previousInput} ${operator} ${currentInput}`;
        addToHistory(expr, result);

        currentInput = result.toString();
        operator = "";
        previousInput = "";
        shouldReset = true;
        updateDisplay();
      }

      function handleNumber(num) {
        if (shouldReset) {
          currentInput = "";
          shouldReset = false;
        }
        if (currentInput === "0" && num !== ".") currentInput = "";
        currentInput += num;
        updateDisplay();
      }

      function handleOperator(op) {
        if (currentInput === "") return;

        if (operator !== "") {
          calculate();
        }

        previousInput = currentInput;
        operator = op;
        currentInput = "";
        updateDisplay();
      }

      function handleSpecial(func) {
        if (currentInput === "") return;

        let num = parseFloat(currentInput);
        let result;

        switch (func) {
          case "sqrt":
            result = Math.sqrt(num);
            break;
          case "sin":
            result = Math.sin((num * Math.PI) / 180);
            break;
          case "cos":
            result = Math.cos((num * Math.PI) / 180);
            break;
          case "tan":
            result = Math.tan((num * Math.PI) / 180);
            break;
          case "log":
            result = Math.log10(num);
            break;
          case "ln":
            result = Math.log(num);
            break;
          case "fact":
            result = factorial(Math.floor(num));
            break;
          case "1/x":
            result = 1 / num;
            break;
          case "%":
            result = num / 100;
            break;
        }

        currentInput = result.toFixed(8).replace(/\.?0+$/, "");
        updateDisplay();
      }

      function factorial(n) {
        if (n < 0) return NaN;
        let res = 1;
        for (let i = 2; i <= n; i++) res *= i;
        return res;
      }

      function clearAll() {
        currentInput = "";
        previousInput = "";
        operator = "";
        updateDisplay();
      }

      function backspace() {
        if (shouldReset) return;
        currentInput = currentInput.slice(0, -1);
        updateDisplay();
      }

      function setMode(mode) {
        isScientific = mode === 1;
        document
          .getElementById("mode-basic")
          .classList.toggle("active", !isScientific);
        document
          .getElementById("mode-scientific")
          .classList.toggle("active", isScientific);
        renderButtons();
      }

      function renderButtons() {
        buttonGrid.innerHTML = "";

        const basicButtons = [
          { text: "C", class: "special", action: clearAll },
          { text: "⌫", class: "special", action: backspace },
          { text: "%", class: "special", action: () => handleSpecial("%") },
          { text: "÷", class: "operator", action: () => handleOperator("/") },

          { text: "7", class: "digit", action: () => handleNumber("7") },
          { text: "8", class: "digit", action: () => handleNumber("8") },
          { text: "9", class: "digit", action: () => handleNumber("9") },
          { text: "×", class: "operator", action: () => handleOperator("*") },

          { text: "4", class: "digit", action: () => handleNumber("4") },
          { text: "5", class: "digit", action: () => handleNumber("5") },
          { text: "6", class: "digit", action: () => handleNumber("6") },
          { text: "-", class: "operator", action: () => handleOperator("-") },

          { text: "1", class: "digit", action: () => handleNumber("1") },
          { text: "2", class: "digit", action: () => handleNumber("2") },
          { text: "3", class: "digit", action: () => handleNumber("3") },
          { text: "+", class: "operator", action: () => handleOperator("+") },

          {
            text: "0",
            class: "digit",
            action: () => handleNumber("0"),
            span: 2,
          },
          { text: ".", class: "digit", action: () => handleNumber(".") },
          { text: "=", class: "equals", action: calculate },
        ];

        if (isScientific) {
          const sciButtons = [
            {
              text: "√",
              class: "special",
              action: () => handleSpecial("sqrt"),
            },
            {
              text: "sin",
              class: "special",
              action: () => handleSpecial("sin"),
            },
            {
              text: "cos",
              class: "special",
              action: () => handleSpecial("cos"),
            },
            {
              text: "tan",
              class: "special",
              action: () => handleSpecial("tan"),
            },

            {
              text: "log",
              class: "special",
              action: () => handleSpecial("log"),
            },
            { text: "ln", class: "special", action: () => handleSpecial("ln") },
            { text: "x²", class: "special", action: () => handleSpecial("^") },
            {
              text: "1/x",
              class: "special",
              action: () => handleSpecial("1/x"),
            },
          ];

          sciButtons.forEach((btn) => {
            const button = document.createElement("button");
            button.textContent = btn.text;
            button.className = btn.class;
            button.onclick = btn.action;
            buttonGrid.appendChild(button);
          });
        }

        basicButtons.forEach((btn) => {
          const button = document.createElement("button");
          button.textContent = btn.text;
          button.className = btn.class;
          if (btn.span) button.style.gridColumn = `span ${btn.span}`;
          button.onclick = btn.action;
          buttonGrid.appendChild(button);
        });
      }

      // Keyboard support
      document.addEventListener("keydown", (e) => {
        if (e.key >= "0" && e.key <= "9") handleNumber(e.key);
        if (e.key === ".") handleNumber(".");
        if (e.key === "+") handleOperator("+");
        if (e.key === "-") handleOperator("-");
        if (e.key === "*") handleOperator("*");
        if (e.key === "/") handleOperator("/");
        if (e.key === "Enter" || e.key === "=") calculate();
        if (e.key === "Backspace") backspace();
        if (e.key === "Escape") clearAll();
      });

      // Initialize
      renderButtons();
      updateDisplay();
    </script>
  </body>
</html>
